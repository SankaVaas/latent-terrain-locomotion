env:
  sim_hz: 500
  control_hz: 50
  episode_len: 1000
  num_terrain_probes: 16
  obs_dim: 49
  action_dim: 12
  action_scale: 20.0

terrains:
  flat:
    friction: 0.8
    restitution: 0.5
    damping: 0.1
  sand:
    friction: 1.2
    restitution: 0.1
    damping: 0.8
  ice:
    friction: 0.05
    restitution: 0.8
    damping: 0.02
  rock:
    friction: 1.0
    restitution: 0.7
    damping: 0.05
  regolith:
    friction: 0.6
    restitution: 0.05
    damping: 1.5

world_model:
  latent_dim: 256
  stoch_dim: 32
  stoch_classes: 32
  terrain_latent_dim: 32
  encoder_hidden: [256, 256]
  decoder_hidden: [256, 256]
  imagine_horizon: 15
  kl_weight: 1.0
  kl_free_nats: 1.0

actor_critic:
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]
  gamma: 0.99
  lambda_: 0.95
  entropy_scale: 3e-4
  actor_lr: 3e-5
  critic_lr: 3e-5
  grad_clip: 100.0

optimizer:
  lr: 1e-4
  eps: 1e-8
  grad_clip: 1000.0

training:
  seed: 42
  collect_steps: 5000
  batch_size: 16
  batch_length: 64
  train_ratio: 512
  replay_capacity: 500000
  log_every: 1000
  eval_every: 10000
  checkpoint_every: 25000
  device: "cpu"

maml:
  inner_lr: 0.01
  inner_steps: 5
  meta_batch_size: 4
  outer_lr: 1e-4
